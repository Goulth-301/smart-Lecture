<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — Smart Lecture Platform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #0a0c10;
      color: #e8edf5;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 54px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .logo { font-size: 17px; font-weight: 500; text-decoration: none; }
    .logo .l1 { color: #e8edf5; }
    .logo .l2 { color: #8ab4d4; }

    .card {
      width: 100%;
      max-width: 400px;
      background: #0e1117;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      margin: 0 1rem;
    }

    .card h2 {
      font-size: 20px;
      font-weight: 500;
      color: #e8edf5;
      margin-bottom: 0.4rem;
    }
    .card .subtitle {
      font-size: 13px;
      color: rgba(232,237,245,0.4);
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 12px;
      color: rgba(232,237,245,0.5);
      margin-bottom: 0.4rem;
      letter-spacing: 0.04em;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: #0a0c10;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #e8edf5;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      font-family: inherit;
      margin-bottom: 1.25rem;
      transition: border-color 0.2s;
    }
    input:focus { border-color: rgba(138,180,212,0.5); }
    input::placeholder { color: rgba(232,237,245,0.2); }

    .password-hint {
      font-size: 11px;
      color: rgba(232,237,245,0.25);
      margin-top: -1rem;
      margin-bottom: 1.25rem;
    }

    .btn-register {
      width: 100%;
      background: #8ab4d4;
      color: #0a0c10;
      font-size: 14px;
      font-weight: 500;
      padding: 11px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      margin-bottom: 1rem;
    }
    .btn-register:hover { background: #9dc3df; }
    .btn-register:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      font-size: 12px;
      color: #F09595;
      margin-bottom: 1rem;
      display: none;
    }
    .error-msg.visible { display: block; }

    .success-msg {
      font-size: 12px;
      color: #5DCAA5;
      margin-bottom: 1rem;
      display: none;
    }
    .success-msg.visible { display: block; }

    .footer-link {
      text-align: center;
      font-size: 13px;
      color: rgba(232,237,245,0.35);
    }
    .footer-link a {
      color: #8ab4d4;
      text-decoration: none;
    }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="index.html">
      <span class="l1">Smart Lecture </span><span class="l2">Platform</span>
    </a>
  </nav>

  <div class="card">
    <h2>Create an account</h2>
    <p class="subtitle">start turning lectures into transcripts</p>

    <label for="name">name</label>
    <input type="text" id="name" placeholder="your name" />

    <label for="email">email</label>
    <input type="email" id="email" placeholder="you@email.com" />

    <label for="password">password</label>
    <input type="password" id="password" placeholder="••••••••" />
    <p class="password-hint">at least 6 characters</p>

    <label for="confirm-password">confirm password</label>
    <input type="password" id="confirm-password" placeholder="••••••••" />

    <p class="error-msg" id="error-msg"></p>
    <p class="success-msg" id="success-msg"></p>

    <button type="button" class="btn-register" id="register-btn" onclick="handleRegister()">create account</button>

    <p class="footer-link">
      already have an account? <a href="login.html">log in</a>
    </p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCeHn5ACani1scy-GsrAfGha-ohISaWV2w",
      authDomain: "smart-lecture-27d96.firebaseapp.com",
      projectId: "smart-lecture-27d96",
      storageBucket: "smart-lecture-27d96.firebasestorage.app",
      messagingSenderId: "27013760765",
      appId: "1:27013760765:web:d66cd3c9c21f02f9cce094"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.handleRegister = async function () {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm-password").value;
      const errorMsg = document.getElementById("error-msg");
      const successMsg = document.getElementById("success-msg");
      const btn = document.getElementById("register-btn");

      errorMsg.classList.remove("visible");
      successMsg.classList.remove("visible");

      // Validations
      if (!name || !email || !password || !confirmPassword) {
        errorMsg.textContent = "please fill in all fields.";
        errorMsg.classList.add("visible");
        return;
      }
      if (password.length < 6) {
        errorMsg.textContent = "password must be at least 6 characters.";
        errorMsg.classList.add("visible");
        return;
      }
      if (password !== confirmPassword) {
        errorMsg.textContent = "passwords do not match.";
        errorMsg.classList.add("visible");
        return;
      }

      btn.disabled = true;
      btn.textContent = "creating account...";

      try {
        // Create user in Firebase Auth
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Save display name
        await updateProfile(user, { displayName: name });

        // Save user document in Firestore /users collection
        await setDoc(doc(db, "users", user.uid), {
          email: email,
          name: name,
          totalUploads: 0,
          createdAt: serverTimestamp()
        });

        successMsg.textContent = "account created! redirecting to login...";
        successMsg.classList.add("visible");

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);

      } catch (err) {
        let msg = "something went wrong. try again.";
        if (err.code === "auth/email-already-in-use") {
          msg = "this email is already registered.";
        } else if (err.code === "auth/invalid-email") {
          msg = "please enter a valid email address.";
        } else if (err.code === "auth/weak-password") {
          msg = "password is too weak.";
        }
        errorMsg.textContent = msg;
        errorMsg.classList.add("visible");
        btn.disabled = false;
        btn.textContent = "create account";
      }
    };

    document.getElementById("confirm-password").addEventListener("keydown", function (e) {
      if (e.key === "Enter") handleRegister();
    });
  </script>

</body>
</html>
